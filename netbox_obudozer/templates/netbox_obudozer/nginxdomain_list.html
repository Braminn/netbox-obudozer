{% extends 'generic/object_list.html' %}

{% block extra_controls %}
<div id="import-result" class="me-2 d-none">
    <div id="import-alert" class="alert alert-sm py-1 mb-0"></div>
</div>
<button id="btn-import" class="btn btn-success btn-sm">
    <i class="mdi mdi-database-import"></i> Импортировать из GitLab
</button>
{% endblock extra_controls %}

{% block javascript %}
{{ block.super }}
<script>
document.getElementById('btn-import').addEventListener('click', function () {
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<i class="mdi mdi-loading mdi-spin"></i> Импортируется...';

    fetch('{% url "plugins:netbox_obudozer:import_nginx_domains" %}', {
        method: 'POST',
        headers: {'X-CSRFToken': '{{ csrf_token }}'},
    })
    .then(r => r.json())
    .then(data => {
        const block = document.getElementById('import-result');
        const alert = document.getElementById('import-alert');
        block.classList.remove('d-none');
        if (data.success) {
            alert.className = 'alert alert-success py-1 mb-0';
            alert.innerHTML = `<i class="mdi mdi-check-circle"></i> Создано: <b>${data.created}</b>, обновлено: <b>${data.updated}</b>, без изменений: <b>${data.skipped}</b>` +
                (data.errors.length ? `<br><span class="text-danger">Ошибки: ${data.errors.join(', ')}</span>` : '');
            setTimeout(() => location.reload(), 1500);
        } else {
            alert.className = 'alert alert-danger py-1 mb-0';
            alert.innerHTML = `<i class="mdi mdi-alert-circle"></i> Ошибка: ${data.error}`;
            btn.disabled = false;
            btn.innerHTML = '<i class="mdi mdi-database-import"></i> Импортировать из GitLab';
        }
    })
    .catch(e => {
        const block = document.getElementById('import-result');
        const alert = document.getElementById('import-alert');
        block.classList.remove('d-none');
        alert.className = 'alert alert-danger py-1 mb-0';
        alert.innerHTML = `<i class="mdi mdi-alert-circle"></i> Ошибка сети: ${e}`;
        btn.disabled = false;
        btn.innerHTML = '<i class="mdi mdi-database-import"></i> Импортировать из GitLab';
    });
});
</script>
{% endblock javascript %}
